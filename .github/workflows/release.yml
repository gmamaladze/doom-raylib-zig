name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Install raylib
        run: brew install raylib

      - name: Build
        working-directory: macdoom
        run: |
          zig build -Doptimize=ReleaseFast \
            -Draylib-include-path=$(brew --prefix raylib)/include \
            -Draylib-lib-path=$(brew --prefix raylib)/lib
          cp zig-out/bin/macdoom ../macdoom-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: macdoom-macos

      - name: Update Homebrew formula SHA
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          VERSION=${TAG#v}
          python3 - "$TARBALL_URL" "$VERSION" "$SHA" <<'EOF'
          import sys, re
          url, version, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          formula = open("Formula/macdoom.rb").read()
          formula = re.sub(r'url ".*"', f'url "{url}"', formula)
          formula = re.sub(r'version ".*"', f'version "{version}"', formula)
          formula = re.sub(r'\n  sha256 ".*"\n', '\n', formula)
          formula = re.sub(r'(  url ".*")', r'\1' + f'\n  sha256 "{sha}"', formula)
          open("Formula/macdoom.rb", "w").write(formula)
          EOF
          cat Formula/macdoom.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add Formula/macdoom.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update Homebrew formula for ${GITHUB_REF#refs/tags/}"
          git push origin master
