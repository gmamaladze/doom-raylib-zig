name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.0

      - name: Install raylib
        run: brew install raylib

      - name: Build
        working-directory: macdoom
        run: |
          zig build -Doptimize=ReleaseFast \
            -Draylib-include-path=$(brew --prefix raylib)/include \
            -Draylib-lib-path=$(brew --prefix raylib)/lib
          cp zig-out/bin/macdoom ../macdoom-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: macdoom-macos

      - name: Update Homebrew formula SHA
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          VERSION=${TAG#v}
          sed -i '' "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/macdoom.rb
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Formula/macdoom.rb
          sed -i '' "/sha256/d" Formula/macdoom.rb
          sed -i '' "/^  url/a\\
            sha256 \"${SHA}\"" Formula/macdoom.rb
          cat Formula/macdoom.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add Formula/macdoom.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update Homebrew formula for ${GITHUB_REF#refs/tags/}"
          git push origin master
